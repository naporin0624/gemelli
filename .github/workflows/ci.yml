name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    name: Lint & Test
    steps:
      - uses: actions/checkout@v7

      - uses: dtolnay/rust-toolchain@1.96.1
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      # Linux build deps: nokhwa (input-native) needs V4L; gemelli-gui pulls in
      # muda (GTK -> glib-sys) and eframe/egui (winit/glutin/glow -> X11, Wayland,
      # xkbcommon, GL). These are the native libraries their build scripts probe
      # via pkg-config; without them the workspace fails to compile on Ubuntu.
      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            libv4l-dev \
            libgtk-3-dev \
            libxdo-dev \
            libxkbcommon-dev \
            libwayland-dev \
            libxcb-render0-dev \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev \
            libgl1-mesa-dev

      # gemelli-gui embeds LINE Seed JP via include_bytes! — see scripts/fetch-fonts.sh.
      - name: Fetch fonts
        run: ./scripts/fetch-fonts.sh

      - name: cargo fmt --check
        run: cargo fmt --all -- --check

      - name: cargo clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      # Native publishers (gemelli-syphon / gemelli-spout) are cfg-gated to
      # macOS / Windows and compile to empty stubs here; their bridges are
      # verified locally per README's "Manual verification checklist".
      # Hardware-dependent tests are #[ignore]d.
      - name: cargo test
        run: cargo test --workspace
