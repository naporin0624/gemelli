name: Windows

on:
  workflow_dispatch:
  pull_request:
    types: [labeled]

jobs:
  check-windows:
    # Fires only via manual dispatch or the ci-windows label (Windows runners
    # bill at 2x Linux minutes; keep this off the automatic PR path).
    if: github.event_name == 'workflow_dispatch' || github.event.label.name == 'ci-windows'
    runs-on: windows-latest
    name: Lint & Test (Windows)
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: recursive

      - uses: dtolnay/rust-toolchain@1.96.1
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      # gemelli-gui embeds LINE Seed JP via include_bytes! — see scripts/fetch-fonts.sh.
      - name: Fetch fonts
        shell: bash
        run: ./scripts/fetch-fonts.sh

      # gemelli-spout compiles SpoutDX + SpoutGL from the vendored Spout2 SDK
      # — see scripts/fetch-spout.sh.
      - name: Fetch Spout2 SDK
        shell: bash
        run: ./scripts/fetch-spout.sh

      - name: cargo clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      # Hardware-dependent tests are #[ignore]d and are not run here.
      - name: cargo test
        run: cargo test --workspace
