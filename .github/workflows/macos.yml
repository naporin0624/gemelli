name: macOS

on:
  workflow_dispatch:
  pull_request:
    types: [labeled]

jobs:
  check:
    # Fires only via manual dispatch or the ci-macos label (macOS runners bill
    # at 10x Linux minutes; keep this off the automatic PR path). Full local
    # gates run on a real Mac before every push, so this is the pre-merge
    # confirmation, not the first line of defense.
    if: github.event_name == 'workflow_dispatch' || github.event.label.name == 'ci-macos'
    runs-on: macos-15
    name: Lint & Test
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: recursive

      - uses: dtolnay/rust-toolchain@1.96.1
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      # crates/publisher links linguine's Syphon bridge against Apple's Syphon.framework,
      # built locally from the vendor/syphon-src submodule — see README.md "Setup" for the
      # source of these commands.
      - name: Build Syphon.framework
        run: |
          cd vendor/syphon-src
          xcodebuild -project Syphon.xcodeproj \
            -scheme Syphon \
            -configuration Release \
            -derivedDataPath build \
            ONLY_ACTIVE_ARCH=NO \
            BUILD_LIBRARY_FOR_DISTRIBUTION=YES
          cp -R build/Build/Products/Release/Syphon.framework ../Syphon.framework

      # gemelli-gui embeds LINE Seed JP via include_bytes! — see scripts/fetch-fonts.sh.
      - name: Fetch fonts
        run: ./scripts/fetch-fonts.sh

      - name: cargo fmt --check
        run: cargo fmt --all -- --check

      - name: cargo clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      # Hardware-dependent tests are #[ignore]d and are not run here; see the
      # "Manual verification checklist" in README.md for the camera/Syphon-client steps.
      - name: cargo test
        run: cargo test --workspace
