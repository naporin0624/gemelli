name: Benchmark

on:
  workflow_dispatch:
    inputs:
      pr:
        description: "PR number to comment on"
        required: false
        type: string
  pull_request:
    types: [labeled]

permissions:
  pull-requests: write
  contents: read

jobs:
  bench-macos:
    # Fires only via manual dispatch or the benchmark label (macOS runners
    # bill at 10x Linux minutes; keep this off the automatic PR path).
    if: github.event_name == 'workflow_dispatch' || github.event.label.name == 'benchmark'
    runs-on: macos-15
    name: Syphon bench (macOS)
    timeout-minutes: 40
    # The implicit default shell on non-Windows runners (no `shell:` set) is
    # `bash -e {0}` *without* `-o pipefail`, so `cargo run | tee file` would
    # report success even if `cargo run` crashes partway through — the tee
    # step still exits 0. Force pipefail so a mid-run crash correctly fails
    # the job instead of silently truncating the bench output.
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: recursive

      - uses: dtolnay/rust-toolchain@1.96.1

      - uses: Swatinem/rust-cache@v2

      # gemelli-syphon links against Apple's Syphon.framework, built locally from the
      # vendor/syphon-src submodule — see README.md "Setup" for the source of these commands.
      - name: Build Syphon.framework
        run: |
          cd vendor/syphon-src
          xcodebuild -project Syphon.xcodeproj \
            -scheme Syphon \
            -configuration Release \
            -derivedDataPath build \
            ONLY_ACTIVE_ARCH=NO \
            BUILD_LIBRARY_FOR_DISTRIBUTION=YES
          cp -R build/Build/Products/Release/Syphon.framework ../Syphon.framework

      - name: Run Syphon CPU bench (markdown)
        run: BENCH_FORMAT=markdown cargo run --release -p gemelli-syphon --example bench_syphon_cpu | tee bench-macos.md

      - name: Append to job summary
        if: always()
        run: cat bench-macos.md >> "$GITHUB_STEP_SUMMARY"

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: bench-macos
          path: bench-macos.md
          if-no-files-found: ignore

  bench-windows:
    # Fires only via manual dispatch or the benchmark label (Windows runners
    # bill at 2x Linux minutes; keep this off the automatic PR path).
    if: github.event_name == 'workflow_dispatch' || github.event.label.name == 'benchmark'
    runs-on: windows-latest
    name: Spout bench (Windows)
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: recursive

      - uses: dtolnay/rust-toolchain@1.96.1

      - uses: Swatinem/rust-cache@v2

      # gemelli-spout compiles SpoutDX + SpoutGL from the vendored Spout2 SDK
      # — see scripts/fetch-spout.sh.
      - name: Fetch Spout2 SDK
        shell: bash
        run: ./scripts/fetch-spout.sh

      - name: Run Spout CPU bench (markdown)
        shell: bash
        run: BENCH_FORMAT=markdown cargo run --release -p gemelli-spout --example bench_spout_cpu | tee bench-windows.md

      - name: Append to job summary
        if: always()
        shell: bash
        run: cat bench-windows.md >> "$GITHUB_STEP_SUMMARY"

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: bench-windows
          path: bench-windows.md
          if-no-files-found: ignore

  comment:
    needs: [bench-macos, bench-windows]
    if: always() && (github.event_name == 'pull_request' || inputs.pr != '')
    runs-on: ubuntu-latest
    name: Post benchmark comment
    steps:
      - name: Download macOS bench artifact
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: bench-macos
          path: artifacts/macos

      - name: Download Windows bench artifact
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: bench-windows
          path: artifacts/windows

      # Body is assembled entirely from artifact files and env-provided
      # scalars (never from raw ${{ }} event strings) before being handed to
      # `gh api`, so nothing from the PR title/body/label can be interpreted
      # as shell syntax here.
      - name: Assemble and upsert PR comment
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event_name == 'pull_request' && github.event.pull_request.number || inputs.pr }}
          SHA: ${{ github.sha }}
          # Job *conclusions*, not just artifact-file presence: the bench
          # binary pipes through `tee`, so a mid-run crash (e.g. a Windows
          # STATUS_ACCESS_VIOLATION) still leaves a partial markdown file on
          # disk to upload. Gating on `needs.*.result` too means a partial
          # file from a failed run renders as the ❌ fallback, not a
          # truncated table.
          MACOS_RESULT: ${{ needs.bench-macos.result }}
          WINDOWS_RESULT: ${{ needs.bench-windows.result }}
        run: |
          set -euo pipefail

          {
            echo "<!-- gemelli-bench -->"
            echo "## Syphon / Spout benchmark"
            echo "_Commit: ${SHA}. GitHub runner GPUs are virtualized (Metal paravirtual / D3D possibly WARP) — treat numbers as relative comparisons between modes, not real-hardware absolutes._"
            echo
            echo "_Reading the columns: 60fps is sustainable iff **wall µs/frame < 16667**. The Windows cpu column is process CPU time (all threads, incl. D3D driver workers), so cpu can exceed wall and CPU% @60fps can exceed 100% without meaning 60fps is impossible; the macOS cpu column is thread time (≤ wall)._"
            echo
            echo "### macOS (Syphon)"
            if [ "$MACOS_RESULT" = "success" ] && [ -f artifacts/macos/bench-macos.md ]; then
              cat artifacts/macos/bench-macos.md
            else
              echo "❌ bench job failed — see run logs"
            fi
            echo
            echo "### Windows (Spout)"
            if [ "$WINDOWS_RESULT" = "success" ] && [ -f artifacts/windows/bench-windows.md ]; then
              cat artifacts/windows/bench-windows.md
            else
              echo "❌ bench job failed — see run logs"
            fi
          } > body.md

          existing_id=$(gh api "repos/${REPO}/issues/${PR_NUMBER}/comments" --paginate \
            --jq '[.[] | select(.body | startswith("<!-- gemelli-bench -->"))][0].id // empty')

          if [ -n "$existing_id" ]; then
            gh api "repos/${REPO}/issues/comments/${existing_id}" -X PATCH -F body=@body.md
          else
            gh api "repos/${REPO}/issues/${PR_NUMBER}/comments" -X POST -F body=@body.md
          fi
